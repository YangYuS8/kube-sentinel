apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-sentinel
  namespace: __KUBE_SENTINEL_NAMESPACE__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-sentinel
rules:
  - apiGroups: ['']
    resources: ['pods', 'configmaps', 'secrets']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch']
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch', 'update']
  - apiGroups: ['apps']
    resources:
      ['deployments', 'statefulsets', 'replicasets', 'controllerrevisions']
    verbs: ['get', 'list', 'watch', 'update', 'patch']
  - apiGroups: ['kubesentinel.io']
    resources: ['healingrequests']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch']
  - apiGroups: ['kubesentinel.io']
    resources: ['healingrequests/status']
    verbs: ['get', 'update', 'patch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-sentinel
subjects:
  - kind: ServiceAccount
    name: kube-sentinel
    namespace: __KUBE_SENTINEL_NAMESPACE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-sentinel
  namespace: __KUBE_SENTINEL_NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-sentinel
    spec:
      serviceAccountName: kube-sentinel
      containers:
        - name: manager
          image: __KUBE_SENTINEL_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: KUBE_SENTINEL_METRICS_BIND_ADDRESS
              value: :8080
            - name: KUBE_SENTINEL_HEALTH_PROBE_BIND_ADDRESS
              value: :8081
            - name: KUBE_SENTINEL_WEBHOOK_BIND_ADDRESS
              value: :8090
            - name: KUBE_SENTINEL_WEBHOOK_PATH
              value: /alertmanager/webhook
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
            - name: webhook
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kube-sentinel
  namespace: __KUBE_SENTINEL_NAMESPACE__
spec:
  selector:
    app.kubernetes.io/name: kube-sentinel
  ports:
    - name: webhook
      port: 8090
      targetPort: webhook
