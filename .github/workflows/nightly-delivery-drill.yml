name: nightly-delivery-drill

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  nightly-drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run delivery pipeline nightly drill
        run: make delivery-pipeline
        env:
          DELIVERY_PIPELINE_DRY_RUN_CMD: "printf 'DRY_RUN_OUTCOME=degrade\nDRY_RUN_REASON=nightly_drill_window\nDRY_RUN_TRACE_KEY=nightly-${{ github.run_id }}\n'"
      - name: Run trend aggregation checks
        run: make delivery-trend-report
