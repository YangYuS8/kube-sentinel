name: release-image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional manual tag to publish (manual-* or v-prefixed semver).'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release plan
        id: plan
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_MANUAL_TAG: ${{ inputs.image_tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done < <(bash ./scripts/release-image-plan.sh)

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.plan.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.plan.outputs.version_tag }}

      - name: Verify published release manifest
        env:
          RELEASE_IMAGE_NAME: ${{ steps.plan.outputs.image_name }}
          RELEASE_TAG: ${{ steps.plan.outputs.version_tag }}
        run: bash ./scripts/verify-release-manifest.sh

      - name: Verify latest manifest
        if: steps.plan.outputs.publish_latest == 'true'
        env:
          RELEASE_IMAGE_NAME: ${{ steps.plan.outputs.image_name }}
          RELEASE_TAG: latest
        run: bash ./scripts/verify-release-manifest.sh
