name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest
      - name: Format check
        run: |
          gofmt -w $(find . -name '*.go' -not -path './vendor/*')
          goimports -w $(find . -name '*.go' -not -path './vendor/*')
          git diff --exit-code
      - name: Delivery pipeline (quality gate -> preprod dry-run -> evidence archive)
        run: make delivery-pipeline
        env:
          DELIVERY_PIPELINE_DRY_RUN_CMD: "printf 'DRY_RUN_OUTCOME=allow\nDRY_RUN_REASON=ci_preprod_simulation\nDRY_RUN_TRACE_KEY=ci-${{ github.run_id }}\n'"
