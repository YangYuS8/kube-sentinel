schema: spec-driven

context: |
  项目目标：构建 Kube-Sentinel，一个面向 Kubernetes 夜间值班场景的轻量哨兵系统。
  它的首要目标不是构建自治运维平台，而是在低爆炸半径、可审计、可人工接管的前提下，减少夜间人工排障与重复操作。

  系统形态：
    - Sentinel Runtime：负责事件接入、状态收敛、最小安全动作、审计与指标
    - Agent Copilot：负责上下文分析、证据汇总、建议生成、交接说明与 OpenSpec 辅助产出
    - Human Operator：负责高风险决策、边界外操作与最终兜底

  范围边界：
    - 优先支持少量、保守、可验证的自动动作，默认聚焦 Deployment 场景
    - 优先减少值班认知负担，而不是扩展组织级治理能力
    - 优先复用 kubectl、Headlamp、Prometheus、Grafana 等现有工具，而不是优先建设新的控制台

  非目标：
    - 不追求无边界自治
    - 不默认构建独立运维平台或自定义高权限 UI 后端
    - 不将开放式推理直接放入 runtime 热路径
    - 不让复杂发布治理、组织流程治理默认进入核心 runtime 范围

rules:
  product_identity:
    - 系统默认应被设计为“值班减负工具”，而不是“自治控制平台”
    - 新能力只有在能够直接减少夜间人工负担时，才应进入核心默认体验
    - 复杂能力若主要服务于白天治理、组织流程或长期趋势分析，应默认降级为外围能力或非核心能力

  runtime_boundaries:
    - runtime 只负责确定性、可验证、低爆炸半径的动作与状态收敛
    - runtime 必须保持幂等，禁止依赖开放式推理或自由文本判断达成状态一致
    - runtime 的自动动作必须收敛到有限集合，优先最小安全动作，禁止默认扩张为多层复杂自治链路
    - 无法证明安全时，runtime 必须默认阻断、降级为只读评估或升级人工介入
    - runtime 核心对象模型应优先表达执行上下文、当前阶段、阻断原因、关联键与下一步建议，禁止默认承载过多组织治理语义

  agent_boundaries:
    - agent 默认只读，主要负责解释、摘要、建议、交接说明与 OpenSpec 产出物辅助
    - agent 可以进行复杂推理，但对 runtime 的输出必须结构化并收敛到有限枚举
    - agent 不得直接作为生产写路径执行任意 kubectl、patch 或自由规划动作
    - agent 不得绕过 runtime 既有安全门禁、幂等约束与审计链路
    - agent 输出必须可追踪到输入证据，并明确表达不确定性与边界条件

  human_in_the_loop:
    - 高风险、不可逆、跨资源、跨命名空间或超出默认动作集合的操作必须保留人工确认
    - 当证据不足、上下文不完整或结论存在冲突时，系统必须默认升级人工处理
    - 系统目标应优先缩短人工理解与接管时间，而不是尽量减少人工参与次数
    - 人工接管路径必须清晰可见，并能快速定位到对应 workload、对象状态、事件与建议动作

  deployment_and_adoption:
    - 部署体验必须像工具而不是平台，默认安装路径应尽量短并具备清晰验证步骤
    - 首次体验必须能够在短时间内展示核心价值：安装、接入、生成对象、查看状态、执行最小演练
    - 默认配置必须保守，优先只读诊断或最小自动动作，禁止默认开启高风险实验能力
    - 系统应明确区分实验模式、值班模式与高级模式，禁止用单一安装形态承载全部能力
    - 系统必须易于关闭自动动作、降级为只读模式或整体退出使用

  operator_experience:
    - 默认体验必须优先回答四个问题：发生了什么、系统做了什么、为什么这样做、现在需要我做什么
    - 默认输出应少而清楚，优先展示 phase、lastAction、blockReasonCode、recommendation、correlationKey 等关键字段
    - 不得要求运维人员先理解大量策略字段或内部实现，才能完成首次使用
    - 系统必须优先降低夜间认知负担与 handoff 成本，而不是优先提供完整治理面

  entrypoint_model:
    - 系统默认采用多入口协同，而不是单一厚控制台
    - Agent 是理解与建议入口，负责 incident 摘要、原因解释、交接说明与下一步建议
    - Headlamp 或 Kubernetes 原生对象视图是对象入口，负责查看 HealingRequest、workload 与 K8s Event
    - Grafana 是趋势入口，负责查看触发、成功率、阻断率、回滚率与其他运行趋势
    - kubectl 是精确入口，负责精确查询、导出详情、人工接管与最小环境排障
    - 系统应优先增强这些入口之间的关联性，而不是优先建设新的聚合面板

  ui_and_surface:
    - 首版产品表面必须保持轻量，优先复用现有 Kubernetes 与 Prometheus 生态界面
    - 默认不建设独立高权限控制台，不建设仅为展示目的的额外读模型或查询后端
    - 如需提供界面能力，应优先提供只读 incident surface，而不是全功能操作面板
    - 控制台相关设计必须优先服务对象定位、趋势观察与人工接管，不得主导 runtime 架构膨胀

  safety_model:
    - 自动化边界必须通过保守默认值体现，而不是依赖无限扩张的策略集合
    - 每次自动写操作前必须满足最小证据要求，并具备明确的停止条件
    - 每次自动写操作必须具备可审计性，并优先具备可回退路径
    - 同一对象在观察窗口内必须受到重复尝试限制，禁止无界重试
    - 复杂场景优先只读评估、证据收集与人工建议，禁止在证据不足时继续扩大自动化范围

  observability_and_audit:
    - 可观测性与审计的首要目标是帮助值班人员快速理解当前局势与支持事后复盘
    - 每次 runtime 决策必须留下清晰、可读、可检索的原因说明
    - agent 生成的建议与摘要必须可关联到对应请求、workload、事件和指标证据
    - correlationKey、namespace 与 workload 标识必须作为跨入口的稳定关联键
    - 禁止为了展示需求而在 runtime 中维护额外复杂统计读模型

  api_and_state_model:
    - API 设计必须优先收缩能力面，而不是暴露完整策略空间
    - runtime 对象状态必须反映当前阶段、最近动作、阻断原因、证据摘要与下一步建议
    - 复杂组织治理、发布流程治理与长期分析语义不应默认进入 runtime 热路径对象
    - agent 相关输出优先作为解释层、附加工件或派生产物，而不是持续膨胀核心 CRD
    - 所有对外字段命名必须直接服务运维理解，禁止使用只有实现者能理解的抽象术语

  delivery_expectations:
    - 变更交付必须优先证明不会扩大 runtime 风险边界
    - runtime 行为变化必须附带失败路径测试、阻断路径测试与人工接管说明
    - agent 能力可以渐进优化，但不得削弱 runtime 的确定性、可审计性与安全边界
    - 交付质量应优先关注误动作率、误阻断率、解释可读性与人工接管效率
    - 非核心实验能力必须与核心值班能力清晰分层，禁止混淆默认承诺范围

  change_governance:
    - 每个新变更必须首先说明其属于 runtime core、agent-facing capability、还是 operator workflow
    - 默认应优先将复杂度放入 agent 辅助层，而不是 runtime 执行层
    - 若某能力不能显著减少夜间人工负担，应默认不进入核心 runtime 范围
    - 引入任何新的自动写路径前，必须先证明其爆炸半径、回退能力与误动作成本可接受
    - OpenSpec 的主要作用是澄清边界、记录决策、限制范围与防止平台化膨胀
