schema: spec-driven

context: |
  项目目标：构建 Kube-Sentinel，一个基于事件驱动的 K8s 故障自愈控制器。
  范围边界：
    - 本项目聚焦“故障检测后的自动处置编排”，不替代完整可观测平台。
    - 自愈动作以 Deployment/StatefulSet 为核心对象，优先覆盖通用工作负载。
  核心技术栈：
    - 语言：Go 1.22+ (强制使用 Controller-runtime 框架)
    - 交互：Client-go (用于声明式 API 操作)
    - 存储：ETCD (作为 K8s 原生存储)
    - 监控集成：Prometheus Alertmanager Webhook
  领域知识：
    - 遵循 Kubernetes Operator Pattern
    - 采用声明式 API 设计 (Custom Resource Definitions)
  设计原则：
    - 安全优先于自动化：无法证明安全时，默认降级为人工介入。
    - 可回滚优先于激进修复：任何动作必须可追踪、可撤销。
    - 渐进式处置：优先最小影响动作，再逐级升级。

rules:
  # 针对 Agent 开发过程的代码规范约束
  coding_standards:
    - 必须遵循 Go 官方风格，并通过 gofmt 与 goimports 格式化
    - 必须采用分层与职责分离：API 定义、Reconciler、领域逻辑、基础设施适配不得混杂
    - Controller 逻辑必须保持声明式与幂等，禁止依赖一次性副作用达成状态一致
    - 所有错误必须显式处理并返回，禁止使用 panic 作为常规错误处理路径
    - 日志必须使用结构化键值（logr 风格），禁止仅输出不可检索的自由文本
    - 禁止硬编码业务阈值与时间窗口，必须通过 CRD 字段或配置项声明
    - 对外 API、CRD 字段、公共函数命名必须语义清晰，禁止含糊缩写

  # 针对自愈逻辑的严谨性要求
  self_healing_logic:
    - 必须支持“多级策略联动”：L1(重启容器) -> L2(镜像回滚) -> L3(人工介入)
    - 所有的自愈动作执行前，必须通过“回滚性校验”：自动创建当前资源的完整备份 (Snapshot)
    - 执行动作必须具备“幂等性”：多次触发同一策略，结果应保持一致
    - 策略升级必须可解释：需记录升级原因、前置条件和失败证据
    - 每次动作必须产出审计记录：包含触发源、目标资源、前后状态、执行结果

  # 针对运维安全性要求
  safety_gate:
    - 必须引入“维护窗口”：允许用户定义禁止自动操作的时间段（如双11期间）
    - 必须实现“速率限制”：禁止在 10 分钟内对同一 Deployment 执行超过 3 次自愈动作
    - 必须包含“爆炸半径控制”：单次自愈动作影响的 Pod 比例不得超过集群总数的 10%
    - 必须具备熔断机制：当连续自愈失败达到阈值时，自动停止该对象后续自愈并升级告警
    - 维护窗口命中时仅允许“只读评估+告警”，禁止任何写操作

  # API 与 CRD 一致性要求
  api_contract:
    - 所有 CRD 字段必须声明默认值、可选性和校验约束（枚举、范围、正则）
    - API 变更必须提供兼容性策略：向后兼容、迁移路径或版本升级计划
    - 状态字段（status）必须反映策略阶段、最近动作、失败原因和下一步建议

  # 可观测性与运维可诊断性要求
  observability:
    - 必须暴露关键指标：触发次数、成功率、回滚次数、熔断次数、各级策略耗时
    - 必须发出结构化事件（K8s Event + 日志），支持按资源和策略级别检索
    - 必须定义最小告警集：自愈失败率异常、熔断触发、维护窗口冲突

  # 针对 UI/控制台集成的约束
  ui_integration:
    - UI 第一优先复用 Kubernetes 原生资源视图与 Prometheus 指标面，禁止在无明确必要时先行引入独立前端后端查询层
    - 对象型界面必须优先消费 CRD status、K8s Event 与标准元数据，避免重复建模同一运行态语义
    - 趋势型界面必须优先消费 Prometheus 指标，禁止在控制器中额外维护仅供展示使用的统计读模型
    - 若引入自定义 UI，必须先定义认证、授权、审计持久化与查询边界，禁止仅为展示目的直接暴露高权限接口
    - 涉及 UI 集成的变更必须同时说明对象视图来源、指标视图来源、关联键设计与最小权限模型

  # 代码质量检查要求
  code_quality_checks:
    - 必须执行 go test ./...，且关键策略模块需包含失败路径测试
    - 必须执行 go test -race 于核心并发路径（controllers 与策略执行链路）
    - 必须执行 go vet ./... 以发现常见静态缺陷
    - 必须执行 golangci-lint run，并清零 blocker 级问题后方可合并
    - 涉及 CRD/API 变更时，必须校验生成物与 schema 一致性（如 controller-gen 输出）
    - 必须在 CI 中固化上述检查，禁止仅依赖本地人工执行

  # 针对任务拆解规范
  tasks:
    - 每个开发任务必须包含对应的 Unit Test (单元测试) 方案
    - 所有的 API 变更必须同步更新 Helm Chart 的 values.yaml 约束
    - 每个任务必须包含明确验收标准（输入条件、预期行为、失败路径）
    - 涉及策略或安全门禁的任务必须包含幂等性与回滚性测试用例
    - 涉及时间窗口、速率限制、爆炸半径的任务必须包含边界值测试

  # 交付质量门槛
  quality_gate:
    - 必须通过静态检查与单元测试后方可合并
    - 必须补充变更文档：风险、回滚方案、发布注意事项
    - 影响生产行为的变更必须提供灰度/分批启用策略
    - 合并前必须完成代码评审清单：代码规范、测试充分性、可回滚性、可观测性
    - 任一质量检查失败时必须阻断交付，不得以“后续修复”跳过
