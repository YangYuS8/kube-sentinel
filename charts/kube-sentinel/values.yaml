image:
  repository: kube-sentinel/controller
  tag: latest

webhook:
  enabled: true
  bindAddress: ':8090'
  path: /alertmanager/webhook

healingRequest:
  workloadKind: Deployment
  snapshotPolicy:
    enabled: true
    retentionMinutes: 60
    restoreTimeoutSeconds: 30
    maxSnapshotsPerWorkload: 20
  statefulSetPolicy:
    enabled: true
    readOnlyOnly: true
    controlledActionsEnabled: false
    l2RollbackEnabled: false
    allowedNamespaces: []
    approvalAnnotation: kube-sentinel.io/statefulset-approved
    requireEvidence: true
    freezeWindowMinutes: 10
    l2CandidateWindowMinutes: 30
    l2MaxDegradeRatePercent: 10
  deploymentPolicy:
    l2CandidateWindowMinutes: 30
    l2MaxDegradeRatePercent: 10
    l1SuccessRateMinPercent: 60
    l2SuccessRateMinPercent: 50
    l3DegradeRateMaxPercent: 40
    blockRateMaxPercent: 30
  productionGatePolicy:
    sampleWindowMinutes: 10
    failureRatioBlockPercent: 30
  releaseReadinessPolicy:
    enabled: true
    maxOpenIncidents: 3
    requireRollbackCandidate: true
    drillEvidenceTTLMinutes: 60
    allowedDecisions:
      - allow
      - degrade
      - block
  deliveryPipeline:
    enabled: true
    nightlySchedule: '0 2 * * 1-5'
    drillWindow: weekdays
    evidenceRetentionDays: 14
  apiContractPolicy:
    compatibilityClass: backward-compatible
    migrationPlanRef: ''
    versionBumpWindow: ''
    riskLevel: low
    requireStatusFields: true
  maintenanceWindows: []
  idempotencyWindowMinutes: 5
  soakTimePolicies:
    - category: CrashLoopBackOff
      severity: Critical
      durationSec: 30
      minSamples: 2
    - category: OOMKilled
      severity: High
      durationSec: 60
      minSamples: 2
    - category: ProbeFailure
      severity: Medium
      durationSec: 120
      minSamples: 3
    - category: Pending
      severity: Low
      durationSec: 300
      minSamples: 3
  namespaceBudget:
    blockingThresholdPercent: 30
    minTotalWorkloads: 5
    fallbackUnhealthyCount: 2
  emergencyTry:
    enabled: false
    maxAttempts: 1
  rateLimit:
    maxActions: 3
    windowMinutes: 10
  blastRadius:
    maxPodPercentage: 10
  circuitBreaker:
    objectFailureThreshold: 3
    domainFailureThreshold: 10
    cooldownMinutes: 10
    scope: Namespace
  healthyRevision:
    observeMinutes: 5
    requireNoCriticalAlerts: true
